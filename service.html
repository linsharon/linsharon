<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service | Dr. Jingjing Lin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav__logo" id="nav-logo">JL</div>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <main class="section detail-page">
      <div class="container">
        <a class="detail-back" href="index.html#services">← Back to Services</a>

        <header class="detail-header" id="service-header" hidden>
          <p class="detail-category" id="service-category"></p>
          <h1 class="detail-title" id="service-title"></h1>
          <p class="detail-description" id="service-description"></p>
          <div class="detail-tags" id="service-tags"></div>
        </header>

        <section class="detail-block" id="service-overview" hidden>
          <h2>Service Overview</h2>
          <p id="service-overview-text"></p>
        </section>

        <section class="detail-block" id="service-deliverables" hidden>
          <h2>What You Get</h2>
          <ul id="service-deliverables-list"></ul>
        </section>

        <section class="detail-grid" id="service-grid"></section>

        <section class="detail-empty" id="service-empty" hidden>
          <h2>Service Not Found</h2>
          <p>The service you requested could not be found.</p>
          <a href="index.html#services" class="btn btn--primary">Go Back</a>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> <span id="profile-name-footer">Dr. Jingjing Lin</span> · All rights reserved.</p>
    </footer>

    <script src="content.js"></script>
    <script src="service-detail.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
