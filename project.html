<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Study | Dr. Jingjing Lin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav__logo" id="nav-logo">JL</div>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <main class="section detail-page">
      <div class="container">
        <a class="detail-back" href="index.html#projects">← Back to Projects</a>

        <header class="detail-header" id="detail-header" hidden>
          <p class="detail-category" id="detail-category"></p>
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-description" id="detail-description"></p>
          <div class="detail-tags" id="detail-tags"></div>
        </header>

        <section class="detail-block" id="detail-overview" hidden>
          <h2>Project Overview</h2>
          <p id="detail-overview-text"></p>
        </section>

        <section class="detail-block" id="detail-highlights" hidden>
          <h2>Key Highlights</h2>
          <ul id="detail-highlights-list"></ul>
        </section>

        <section class="detail-grid" id="detail-grid"></section>

        <section class="detail-empty" id="detail-empty" hidden>
          <h2>Project Not Found</h2>
          <p>The case study you requested could not be found.</p>
          <a href="index.html#projects" class="btn btn--primary">Go Back</a>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> <span id="profile-name-footer">Dr. Jingjing Lin</span> · All rights reserved.</p>
    </footer>

    <script src="content.js"></script>
    <script src="project-detail.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
