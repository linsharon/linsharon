<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Jingjing Lin — UX Designer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="nav">
      <div class="nav__logo" id="nav-logo">JL</div>
      <ul class="nav__links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#tools">Tools</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <!-- Hero -->
    <header class="hero">
      <div class="hero__content">
        <p class="hero__greeting">Hello, I'm</p>
        <h1 class="hero__name" id="profile-name">Dr. Jingjing Lin</h1>
        <p class="hero__title" id="profile-role">User Experience Designer</p>
        <p class="hero__subtitle" id="profile-tagline"></p>
        <a href="#projects" class="btn btn--primary">View My Work</a>
      </div>
      <div class="hero__media" id="hero-media">
        <img
          id="profile-photo"
          class="hero__photo"
          src="profile-photo.png"
          alt="Portrait of Dr. Jingjing Lin"
        />
      </div>
    </header>

    <!-- About -->
    <section id="about" class="about section">
      <div class="container">
        <h2 class="section__title">About Me</h2>
        <div class="about__grid">
          <div class="about__text" id="about-bio"></div>
          <ul class="about__skills" id="about-skills"></ul>
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="projects section section--alt">
      <div class="container">
        <h2 class="section__title">Selected Projects</h2>
        <p class="section__subtitle" id="projects-subtitle"></p>

        <div class="projects__grid" id="projects-grid">
          <!-- Cards are injected by projects.js -->
        </div>
      </div>
    </section>

    <!-- Tools -->
    <section id="tools" class="tools section">
      <div class="container">
        <h2 class="section__title">Tools</h2>
        <p class="section__subtitle" id="tools-subtitle"></p>

        <div class="projects__grid" id="tools-grid">
          <!-- Tool cards are injected by projects.js -->
        </div>
      </div>
    </section>

    <!-- Services -->
    <section id="services" class="services section section--alt">
      <div class="container">
        <h2 class="section__title">Services</h2>
        <p class="section__subtitle" id="services-subtitle"></p>

        <div class="projects__grid" id="services-grid">
          <!-- Service cards are injected by projects.js -->
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="contact section">
      <div class="container contact__inner">
        <h2 class="section__title">Get In Touch</h2>
        <p class="contact__copy" id="contact-copy"></p>
        <a href="mailto:hello@jingjinglin.design" class="btn btn--primary" id="contact-email"
          >Say Hello</a
        >
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>© <span id="year"></span> <span id="profile-name-footer">Dr. Jingjing Lin</span> · All rights reserved.</p>
    </footer>

    <script src="content.js"></script>
    <script src="projects.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
